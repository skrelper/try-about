<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Try About Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="sentence">
  <span class="fixed">TRY</span>

  <div class="slot-container">
    <div id="verb-slot" class="slot"></div>
  </div>

  <span class="fixed">ABOUT</span>

  <div class="slot-container">
    <div id="topic-slot" class="slot"></div>
  </div>
</div>

<button id="spinButton">SPIN</button>

<script src="script.js"></script>
</body>
</html>
